<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tienda | El Gallo Fino & Algo Más</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #C9A84C; --gold-light: #E8C96A;
    --red: #8B1A1A;
    --dark: #0D0A06; --dark2: #1A1409; --dark3: #241C0E;
    --cream: #F5EDD8; --text: #D4C5A9; --white: #FFF8ED;
    --border: rgba(201,168,76,0.14);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Barlow', sans-serif; background: var(--dark); color: var(--text); }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--gold); padding: 7px 5%; text-align: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem;
    font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dark);
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,10,6,0.97); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    display: flex; align-items: center; gap: 20px;
    padding: 14px 5%; flex-wrap: wrap;
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 900; color: var(--gold);
    text-decoration: none; white-space: nowrap;
  }
  .search-bar {
    flex: 1; display: flex; min-width: 200px;
  }
  .search-bar input {
    flex: 1; padding: 10px 16px;
    background: var(--dark3); border: 1px solid var(--border);
    border-right: none; color: var(--white); font-family: 'Barlow', sans-serif;
    font-size: 0.9rem; outline: none;
  }
  .search-bar input::placeholder { color: rgba(213,197,169,0.4); }
  .search-bar button {
    background: var(--gold); border: none; padding: 0 18px;
    cursor: pointer; font-size: 1.1rem; color: var(--dark);
    transition: background 0.2s;
  }
  .search-bar button:hover { background: var(--gold-light); }
  .cart-btn {
    position: relative; background: var(--dark3); border: 1px solid var(--border);
    color: var(--white); padding: 10px 18px; cursor: pointer;
    font-size: 1.1rem; display: flex; align-items: center; gap: 8px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem;
    font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    transition: border-color 0.2s;
  }
  .cart-btn:hover { border-color: var(--gold); color: var(--gold); }
  .cart-count {
    background: var(--gold); color: var(--dark);
    border-radius: 50%; width: 20px; height: 20px;
    font-size: 0.7rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    position: absolute; top: -6px; right: -6px;
  }

  /* ── LAYOUT ── */
  .shop-layout {
    display: flex; min-height: calc(100vh - 100px);
    gap: 0; max-width: 1400px; margin: 0 auto; padding: 0 5%;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 230px; flex-shrink: 0; padding: 32px 0 32px;
    border-right: 1px solid var(--border);
    padding-right: 24px;
  }
  .filter-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 14px; margin-top: 28px;
  }
  .filter-title:first-child { margin-top: 0; }
  .cat-filter-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .cat-filter-list li button {
    width: 100%; text-align: left; background: none; border: none;
    padding: 9px 14px; cursor: pointer;
    font-family: 'Barlow', sans-serif; font-size: 0.88rem; font-weight: 400;
    color: var(--text); transition: all 0.15s;
  }
  .cat-filter-list li button:hover { color: var(--gold); background: rgba(201,168,76,0.05); }
  .cat-filter-list li button.active {
    color: var(--dark); background: var(--gold); font-weight: 600;
  }
  .price-inputs { display: flex; gap: 8px; align-items: center; }
  .price-inputs input {
    width: 80px; padding: 8px 10px;
    background: var(--dark3); border: 1px solid var(--border);
    color: var(--white); font-family: 'Barlow', sans-serif; font-size: 0.82rem;
    outline: none;
  }
  .price-inputs input:focus { border-color: var(--gold); }
  .price-inputs span { color: var(--text); opacity: 0.5; }
  .apply-filter {
    margin-top: 10px; width: 100%; background: var(--dark3);
    border: 1px solid var(--border); color: var(--gold);
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px; cursor: pointer; transition: all 0.2s;
  }
  .apply-filter:hover { background: var(--gold); color: var(--dark); }

  /* ── MAIN CONTENT ── */
  .main-content { flex: 1; padding: 32px 0 32px 28px; }
  .results-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .results-info {
    font-size: 0.9rem; color: var(--text); opacity: 0.7;
  }
  .results-info strong { color: var(--white); opacity: 1; }
  .sort-select {
    background: var(--dark3); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px;
    font-family: 'Barlow', sans-serif; font-size: 0.85rem; outline: none;
    cursor: pointer;
  }

  /* ── PRODUCT GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .product-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    transition: all 0.2s;
    position: relative;
    cursor: pointer;
    display: flex; flex-direction: column;
  }
  .product-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .product-img {
    aspect-ratio: 1; background: var(--dark3);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; position: relative;
    overflow: hidden;
  }
  .product-badge {
    position: absolute; top: 10px; left: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 4px 9px;
  }
  .badge-nuevo { background: var(--gold); color: var(--dark); }
  .badge-oferta { background: var(--red); color: var(--white); }
  .badge-agotado { background: rgba(80,80,80,0.9); color: var(--text); }
  .product-info { padding: 14px; flex: 1; display: flex; flex-direction: column; }
  .product-cat-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold); opacity: 0.8;
    margin-bottom: 5px;
  }
  .product-name {
    font-size: 0.88rem; font-weight: 500; color: var(--white);
    line-height: 1.3; margin-bottom: 8px; flex: 1;
  }
  .product-price-area { margin-top: auto; }
  .product-price-old {
    font-size: 0.75rem; color: var(--text); opacity: 0.45;
    text-decoration: line-through;
  }
  .product-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.25rem; font-weight: 700; color: var(--white);
  }
  .product-price .cop { font-size: 0.75rem; font-weight: 400; opacity: 0.7; margin-right: 2px; }
  .product-actions { display: flex; gap: 6px; margin-top: 12px; }
  .btn-add {
    flex: 1; background: var(--gold); color: var(--dark);
    border: none; padding: 9px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-add:hover { background: var(--gold-light); }
  .btn-add:disabled { background: rgba(100,100,100,0.4); color: var(--text); cursor: not-allowed; }
  .btn-wa {
    background: #25D366; border: none; padding: 9px 12px;
    cursor: pointer; font-size: 0.95rem;
    transition: opacity 0.2s;
  }
  .btn-wa:hover { opacity: 0.85; }

  /* ── CARRITO LATERAL ── */
  .cart-panel {
    position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
    background: var(--dark2); border-left: 1px solid var(--border);
    z-index: 300; transition: right 0.3s ease;
    display: flex; flex-direction: column;
    box-shadow: -8px 0 40px rgba(0,0,0,0.6);
  }
  .cart-panel.open { right: 0; }
  .cart-header {
    padding: 24px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cart-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 900; color: var(--white);
  }
  .cart-close {
    background: none; border: none; color: var(--text);
    font-size: 1.4rem; cursor: pointer; padding: 4px 8px;
    transition: color 0.2s;
  }
  .cart-close:hover { color: var(--gold); }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
  .cart-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .cart-item-emoji { font-size: 2.5rem; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 0.88rem; font-weight: 500; color: var(--white); margin-bottom: 4px; }
  .cart-item-price { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: var(--gold); }
  .cart-item-qty {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
  }
  .qty-btn {
    background: var(--dark3); border: 1px solid var(--border);
    color: var(--white); width: 26px; height: 26px;
    cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
  }
  .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
  .qty-num { font-size: 0.9rem; font-weight: 600; color: var(--white); min-width: 20px; text-align: center; }
  .cart-remove { background: none; border: none; color: var(--text); opacity: 0.4; cursor: pointer; font-size: 1rem; padding: 2px 6px; transition: opacity 0.2s; }
  .cart-remove:hover { opacity: 1; color: #e53935; }
  .cart-empty { text-align: center; padding: 60px 20px; color: var(--text); opacity: 0.4; font-size: 0.9rem; }
  .cart-footer { padding: 20px; border-top: 1px solid var(--border); }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cart-total-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }
  .cart-total-val { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: var(--gold); }
  .btn-checkout {
    width: 100%; background: #25D366; border: none; color: white;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 16px; cursor: pointer; transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-checkout:hover { opacity: 0.9; }
  .cart-note { font-size: 0.75rem; text-align: center; margin-top: 10px; color: var(--text); opacity: 0.5; }

  /* ── OVERLAY ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  /* ── MODAL PRODUCTO ── */
  .modal {
    position: fixed; inset: 0; z-index: 400;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal.open { opacity: 1; pointer-events: all; }
  .modal-inner {
    background: var(--dark2); border: 1px solid var(--border);
    max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    background: none; border: none; color: var(--text);
    font-size: 1.4rem; cursor: pointer; z-index: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--gold); }
  .modal-img {
    width: 100%; aspect-ratio: 16/9; background: var(--dark3);
    display: flex; align-items: center; justify-content: center; font-size: 7rem;
  }
  .modal-body { padding: 28px; }
  .modal-cat { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: var(--white); margin-bottom: 12px; line-height: 1.1; }
  .modal-desc { font-size: 0.9rem; font-weight: 300; line-height: 1.75; color: var(--text); margin-bottom: 20px; }
  .modal-price { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 700; color: var(--gold); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .modal-btn-add { flex: 1; background: var(--gold); color: var(--dark); border: none; padding: 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .modal-btn-add:hover { background: var(--gold-light); }
  .modal-btn-wa { background: #25D366; color: white; border: none; padding: 14px 20px; cursor: pointer; font-size: 1.1rem; transition: opacity 0.2s; }
  .modal-btn-wa:hover { opacity: 0.85; }

  /* ── WA FLOAT ── */
  .wa-float { position: fixed; bottom: 28px; right: 28px; z-index: 200; width: 56px; height: 56px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 24px rgba(37,211,102,0.4); text-decoration: none; font-size: 1.6rem; animation: bounce 2s infinite; }

  /* ── PAGINATION ── */
  .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
  .page-btn { background: var(--dark3); border: 1px solid var(--border); color: var(--text); width: 38px; height: 38px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .page-btn:hover, .page-btn.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--gold); color: var(--dark); padding: 12px 24px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    z-index: 500; opacity: 0; transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .shop-layout { padding: 0 3%; }
    .main-content { padding: 20px 0; }
    .cart-panel { width: 100%; right: -100%; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  }
</style>
</head>

<!-- NAV -->
<nav>

<!-- CART PANEL -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>
<div class="cart-panel" id="cartPanel">

</div>

<!-- MODAL PRODUCTO -->
<div class="overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="productModal">

    <div class="modal-body">

      <div class="modal-name" id="modalName"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-actions">
        <button class="modal-btn-add" id="modalAddBtn" onclick="addFromModal()">+ Agregar al carrito</button>
        <button class="modal-btn-wa" onclick="orderDirectWA()">💬 Pedir directo</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Producto agregado</div>

<!-- WA FLOAT -->
<a class="wa-float" href="https://wa.me/573136539479?text=Hola,%20quiero%20hacer%20un%20pedido" target="_blank">💬</a>

  { id:22, name:"Bomba de Aspersión Manual 20L", cat:"equipos", emoji:"💦", price:125000, oldPrice:140000, badge:"oferta", desc:"Fumigadora de espalda para desinfección de galpones. Boquilla ajustable, manguera reforzada 1.5m.", stock:true },

// ─── STATE ───────────────────────────────────────────────
let cart = [];
let filteredProducts = [...PRODUCTS];
let currentCat = 'all';
let currentStock = 'all';
let currentPage = 1;
const PAGE_SIZE = 12;
let currentModal = null;

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Check URL params for category filter
  const params = new URLSearchParams(window.location.search);
  const catParam = params.get('cat');
  if (catParam) {
    currentCat = catParam;
    document.querySelectorAll('#catFilters button').forEach(b => b.classList.remove('active'));
    const btn = [...document.querySelectorAll('#catFilters button')].find(b => b.onclick?.toString().includes(catParam));
    if (btn) btn.classList.add('active');
  }
  applyFilters();
});

// ─── FILTER & SORT ────────────────────────────────────────
function filterCat(cat, btn) {
  currentCat = cat; currentPage = 1;
  document.querySelectorAll('#catFilters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function filterStock(stock, btn) {
  currentStock = stock; currentPage = 1;
  document.querySelectorAll('#stockFilters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function applyPriceFilter() {
  currentPage = 1; applyFilters();
}
function applySearch() {
  currentPage = 1; applyFilters();
}
document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') applySearch(); });

function sortProducts() { currentPage = 1; applyFilters(); }

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const minP = parseFloat(document.getElementById('priceMin').value) || 0;
  const maxP = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const sort = document.getElementById('sortSelect').value;

  filteredProducts = PRODUCTS.filter(p => {
    if (currentCat !== 'all' && p.cat !== currentCat) return false;
    if (currentStock === 'disponible' && !p.stock) return false;
    if (currentStock === 'oferta' && p.badge !== 'oferta') return false;
    if (p.price < minP || p.price > maxP) return false;
    if (search && !p.name.toLowerCase().includes(search) && !p.desc.toLowerCase().includes(search)) return false;
    return true;
  });

  if (sort === 'price-asc') filteredProducts.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') filteredProducts.sort((a,b) => b.price - a.price);
  else if (sort === 'name') filteredProducts.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('resultCount').textContent = filteredProducts.length;
  renderGrid();
  renderPagination();
}

// ─── RENDER ──────────────────────────────────────────────
function renderGrid() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredProducts.slice(start, start + PAGE_SIZE);
  const grid = document.getElementById('productGrid');

  if (page.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text);opacity:0.5;font-size:1rem;">
      Sin resultados para esa búsqueda. Intenta con otros términos.
    </div>`;
    return;
  }

  grid.innerHTML = page.map(p => `
    <div class="product-card" onclick="openModal(${p.id})">
      <div class="product-img">
        ${p.badge ? `<span class="product-badge badge-${p.badge === 'nuevo' ? 'nuevo' : p.badge === 'oferta' ? 'oferta' : 'agotado'}">${p.badge === 'nuevo' ? 'Nuevo' : p.badge === 'oferta' ? '🔥 Oferta' : 'Agotado'}</span>` : ''}
        ${!p.stock ? `<span class="product-badge badge-agotado">Agotado</span>` : ''}
        ${p.emoji}
      </div>
      <div class="product-info">
        <span class="product-cat-tag">${catLabel(p.cat)}</span>
        <div class="product-name">${p.name}</div>
        <div class="product-price-area">
          ${p.oldPrice ? `<div class="product-price-old">$ ${fmt(p.oldPrice)}</div>` : ''}
          <div class="product-price"><span class="cop">COP</span>${fmt(p.price)}</div>
        </div>
        <div class="product-actions" onclick="event.stopPropagation()">
          <button class="btn-add" ${!p.stock ? 'disabled' : ''} onclick="addToCart(${p.id})">
            ${p.stock ? '+ Agregar' : 'Agotado'}
          </button>
          ${p.stock ? `<button class="btn-wa" onclick="quickWA(${p.id})" title="Pedir por WhatsApp">💬</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function renderPagination() {
  const total = Math.ceil(filteredProducts.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= total; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  pg.innerHTML = html;
}

function goPage(n) {
  currentPage = n;
  renderGrid();
  renderPagination();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

// ─── CART ────────────────────────────────────────────────
function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p || !p.stock) return;
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartUI();
  showToast(`✓ ${p.name.split(' ').slice(0,3).join(' ')} agregado`);
}
function addFromModal() { if (currentModal) addToCart(currentModal.id); closeModal(); }

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateCartUI();
}
function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = total;

  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = `<div class="cart-empty">Tu carrito está vacío 🛒<br/>Agrega productos para continuar.</div>`;
  } else {
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <span class="cart-item-emoji">${item.emoji}</span>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">COP ${fmt(item.price * item.qty)}</div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, +1)">+</button>
          </div>
        </div>
        <button class="cart-remove" onclick="removeFromCart(${item.id})">🗑</button>
      </div>
    `).join('');
  }

  const totalVal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cartTotal').textContent = `$${fmt(totalVal)}`;
}

// ─── WHATSAPP ─────────────────────────────────────────────
function sendWhatsApp() {
  if (cart.length === 0) { showToast('⚠ Agrega productos primero'); return; }
  let msg = '🐓 *Hola! Quiero hacer este pedido:*\n\n';
  cart.forEach(i => { msg += `• ${i.name} x${i.qty} = COP ${fmt(i.price * i.qty)}\n`; });
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  msg += `\n*TOTAL ESTIMADO: COP ${fmt(total)}*\n\n📍 Por favor confirmar disponibilidad, forma de pago y envío. ¡Gracias!`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}
function quickWA(id) {
  const p = PRODUCTS.find(x => x.id === id);
  const msg = `🐓 Hola! Me interesa este producto:\n\n*${p.name}*\nPrecio: COP ${fmt(p.price)}\n\n¿Está disponible? ¿Cuál es el costo de envío a mi ciudad?`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}
function orderDirectWA() {
  if (currentModal) quickWA(currentModal.id);
  closeModal();
}

// ─── MODAL ───────────────────────────────────────────────
function openModal(id) {
  const p = PRODUCTS.find(x => x.id === id);
  currentModal = p;
  document.getElementById('modalImg').textContent = p.emoji;
  document.getElementById('modalCat').textContent = catLabel(p.cat);
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalDesc').textContent = p.desc;
  document.getElementById('modalPrice').textContent = `COP ${fmt(p.price)}`;
  document.getElementById('modalAddBtn').disabled = !p.stock;
  document.getElementById('modalAddBtn').textContent = p.stock ? '+ Agregar al carrito' : 'Producto agotado';
  document.getElementById('productModal').classList.add('open');
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() {
  document.getElementById('productModal').classList.remove('open');
  document.getElementById('modalOverlay').classList.remove('active');
  currentModal = null;
}

// ─── CART TOGGLE ─────────────────────────────────────────
function toggleCart() {
  document.getElementById('cartPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
  updateCartUI();
}
function closeAll() {
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  closeModal();
}

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── HELPERS ─────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('es-CO'); }
function catLabel(cat) {
  return { gallistica:'Gallística', veterinaria:'Veterinaria', suplementos:'Suplementos', equipos:'Equipos' }[cat] || cat;
}
</script>
